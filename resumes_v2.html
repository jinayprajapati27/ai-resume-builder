    <script src="/js/main.js"></script>
    
    <script>
    async function confirmDelete(id) {
        if (confirm('Are you sure you want to delete this resume?')) {
            try {
                const response = await fetch(`/api/resume/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    const card = document.querySelector(`[data-id="${id}"]`);
                    card.style.transform = 'scale(0.8)';
                    card.style.opacity = '0';
                    setTimeout(() => card.remove(), 300);
                }
            } catch (err) {
                console.error(err);
                alert('Failed to delete resume');
            }
        }
    }

    async function downloadDocx(id) {
        try {
            const res = await fetch(`/api/resume/${id}`);
            const resume = await res.json();
            
            const exportRes = await fetch('/api/resume/export-docx', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ resumeData: resume })
            });

            const blob = await exportRes.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Resume_${resume.personal.fullName.replace(/\s+/g, '_')}.docx`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } catch (err) {
            console.error(err);
            alert('Export failed');
        }
    }
    </script>
    
    <script>
        // Ensure User ID cookie exists
        (function() {
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }
            function setCookie(name, value, days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                document.cookie = `${name}=${value};expires=${date.toUTCString()};path=/`;
            }
            if (!getCookie('resume_user_id')) {
                const newId = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
                setCookie('resume_user_id', newId, 365);
            }
        })();

        if (sessionStorage.getItem('resumeData')) {
            const link = document.getElementById('navResumeLink');
            if (link) link.style.display = 'inline';
        }
    </script>
